<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonlight Music</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #121212; color: white; padding: 50px; }
        input { padding: 10px; width: 250px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #1DB954; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .player { margin-top: 30px; border: 1px solid #333; padding: 20px; display: inline-block; border-radius: 10px; }
        img { border-radius: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <h1>🌙 Moonlight Music</h1>
    
    <form method="POST" action="/">
        <input type="text" name="query" placeholder="Gaane ka naam likho..." required>
        <button type="submit">Search & Play</button>
    </form>

    <hr style="margin: 30px 0; border: 0.5px solid #333;">

    {% if song %}
        <div class="player">
            <h2>{{ song.title }}</h2>
            <img src="{{ song.thumbnail }}" width="250px">
            <br>
            <audio controls autoplay style="width: 300px;">
                <source src="{{ song.audio_url }}" type="audio/mpeg">
                Tera browser audio support nahi kar raha bhai.
            </audio>
        </div>
    {% elif request.method == 'POST' %}
        <p style="color: red;">Bhai, gaana nahi mila. Kuch aur search kar!</p>
    {% endif %}
</body>
</html>
