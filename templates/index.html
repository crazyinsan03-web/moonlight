<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonlight Luxury Streamer</title>

    <link rel="manifest" href="/manifest.json">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    
    <style>
        :root {
            --primary: #1DB954;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 10% 20%, rgba(29, 185, 84, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(29, 185, 84, 0.05) 0%, transparent 40%);
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .dashboard {
            width: 100%;
            max-width: 1050px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 40px;
            display: flex;
            flex-direction: row;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
            overflow: hidden;
        }

        /* Sidebar */
        .left-panel {
            width: 30%;
            padding: 50px 40px;
            background: rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-right: 1px solid var(--border);
        }

        .brand h1 { color: var(--primary); letter-spacing: 3px; margin: 0; font-size: 28px; }
        .brand p { color: #444; font-size: 10px; margin-bottom: 40px; letter-spacing: 2px; }

        input[type="text"] {
            width: 100%;
            padding: 16px 20px;
            border-radius: 15px;
            border: 1px solid #222;
            background: rgba(255,255,255,0.02);
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus { border-color: var(--primary); background: rgba(255,255,255,0.05); }

        .btn-search {
            width: 100%;
            margin-top: 15px;
            padding: 14px;
            border-radius: 15px;
            background: var(--primary);
            color: black;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        /* Player */
        .right-panel {
            flex: 1;
            padding: 50px;
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .art-wrapper { position: relative; }
        .album-art {
            width: 300px;
            height: 300px;
            border-radius: 25px;
            object-fit: cover;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            z-index: 2;
            position: relative;
        }

        .art-glow {
            position: absolute;
            top: 20px; left: 20px; right: 20px; bottom: 20px;
            background: var(--primary);
            filter: blur(50px);
            opacity: 0.2;
        }

        .player-info { flex: 1; }
        .song-title { font-size: 24px; font-weight: 600; margin: 0 0 10px 0; line-height: 1.3; }

        /* Visualizer */
        .visualizer { display: flex; gap: 4px; align-items: flex-end; height: 25px; margin-bottom: 15px; }
        .bar { width: 3px; background: var(--primary); border-radius: 2px; }
        .playing .bar { animation: dance 0.6s infinite alternate; }

        @keyframes dance {
            from { height: 4px; opacity: 0.3; }
            to { height: 25px; opacity: 1; }
        }

        /* Progress Bar */
        .progress-root {
            width: 100%;
            height: 5px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin: 25px 0;
            cursor: pointer;
            position: relative;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: var(--primary);
            border-radius: 10px;
            box-shadow: 0 0 10px var(--primary);
        }

        .controls { display: flex; align-items: center; gap: 30px; margin-bottom: 25px; }
        .play-btn { font-size: 60px; color: white; cursor: pointer; transition: 0.2s; }
        .play-btn:hover { color: var(--primary); transform: scale(1.1); }

        .vol-box { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.03); padding: 10px 20px; border-radius: 50px; width: fit-content; }
        input[type="range"] { accent-color: var(--primary); cursor: pointer; }

        /* Responsive */
        @media (max-width: 900px) {
            .dashboard { flex-direction: column; height: auto; }
            .left-panel { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
            .right-panel { flex-direction: column; text-align: center; }
            .visualizer { justify-content: center; }
            .vol-box { margin: 0 auto; }
        }
    </style>
</head>
<body>

    <div class="dashboard" id="main-container">
        <div class="left-panel">
            <div class="brand">
                <h1>MOONLIGHT</h1>
                <p>ANISH'S PRIVATE STREAMER</p>
            </div>
            <form method="POST">
                <input type="text" name="song_name" placeholder="Search song..." required autocomplete="off">
                <button type="submit" class="btn-search">PLAY NOW</button>
            </form>
        </div>

        <div class="right-panel">
            {% if song %}
                <div class="art-wrapper">
                    <div class="art-glow"></div>
                    <img src="{{ song.thumbnail }}" class="album-art">
                </div>

                <div class="player-info">
                    <div class="visualizer" id="viz">
                        <div class="bar" style="animation-delay: 0.1s"></div>
                        <div class="bar" style="animation-delay: 0.3s"></div>
                        <div class="bar" style="animation-delay: 0.2s"></div>
                        <div class="bar" style="animation-delay: 0.4s"></div>
                        <div class="bar" style="animation-delay: 0.1s"></div>
                    </div>
                    <h2 class="song-title">{{ song.title }}</h2>
                    
                    <audio id="audio" src="{{ song.audio_url }}" autoplay></audio>

                    <div class="progress-root" id="progress-root">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>

                    <div class="controls">
                        <i class="fas fa-backward" style="color:#333"></i>
                        <i class="fas fa-pause-circle play-btn" id="play-btn"></i>
                        <i class="fas fa-forward" style="color:#333"></i>
                        <a href="{{ song.audio_url }}" download style="color:#555; font-size: 20px;"><i class="fas fa-download"></i></a>
                    </div>

                    <div class="vol-box">
                        <i class="fas fa-volume-down" style="color:#444"></i>
                        <input type="range" id="vol" min="0" max="1" step="0.1" value="1">
                    </div>
                </div>
            {% else %}
                <div style="width:100%; text-align:center; opacity:0.1;">
                    <i class="fas fa-music" style="font-size: 100px;"></i>
                    <p>Enter a song to start the vibe</p>
                </div>
            {% endif %}
        </div>
    </div>

    <script>
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('play-btn');
        const vol = document.getElementById('vol');
        const progressRoot = document.getElementById('progress-root');
        const progressFill = document.getElementById('progress-fill');
        const container = document.getElementById('main-container');

        if(audio) {
            // Play/Pause
            playBtn.addEventListener('click', () => {
                if (audio.paused) {
                    audio.play();
                    playBtn.className = 'fas fa-pause-circle play-btn';
                    container.classList.add('playing');
                } else {
                    audio.pause();
                    playBtn.className = 'fas fa-play-circle play-btn';
                    container.classList.remove('playing');
                }
            });

            // Sync visualizer on load
            audio.onplay = () => container.classList.add('playing');

            // Progress Bar Update
            audio.addEventListener('timeupdate', () => {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = percent + '%';
            });

            // Seek
            progressRoot.addEventListener('click', (e) => {
                const width = progressRoot.clientWidth;
                const clickX = e.offsetX;
                audio.currentTime = (clickX / width) * audio.duration;
            });

            // Volume
            vol.addEventListener('input', (e) => { audio.volume = e.target.value; });
        }
    </script>
</body>
</html>
